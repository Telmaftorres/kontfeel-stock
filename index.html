<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Kontfeel Stock</title>
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="K-Stock" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: #0f172a;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Camera ── */
    #camera-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #canvas { display: none; }

    /* Scan frame overlay */
    .scan-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .scan-frame {
      width: 220px;
      height: 220px;
      position: relative;
    }

    .scan-frame::before,
    .scan-frame::after,
    .scan-corner-br,
    .scan-corner-bl {
      content: '';
      position: absolute;
      width: 36px;
      height: 36px;
      border-color: white;
      border-style: solid;
    }
    .scan-frame::before { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .scan-frame::after  { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .scan-corner-br { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
    .scan-corner-bl { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }

    .scan-line {
      position: absolute;
      left: 4px; right: 4px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #4f46e5, white, #4f46e5, transparent);
      animation: scan 2s ease-in-out infinite;
      border-radius: 2px;
    }
    @keyframes scan {
      0%   { top: 8px; opacity: 1; }
      50%  { top: calc(100% - 8px); opacity: 1; }
      100% { top: 8px; opacity: 1; }
    }

    .scan-hint {
      margin-top: 20px;
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      text-align: center;
    }

    /* Top bar */
    .top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
      z-index: 10;
      pointer-events: all;
    }

    .top-logo { font-size: 15px; font-weight: 700; color: white; }

    .top-actions { display: flex; gap: 8px; }

    .icon-btn {
      width: 38px; height: 38px;
      background: rgba(255,255,255,0.15);
      border: none; border-radius: 50%;
      color: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
      backdrop-filter: blur(4px);
      font-size: 16px;
    }

    /* ── Bouton + flottant ── */
    .fab {
      position: fixed;
      bottom: 32px; right: 24px;
      width: 60px; height: 60px;
      background: #4f46e5;
      border: none; border-radius: 50%;
      color: white; font-size: 32px; font-weight: 300;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(79,70,229,0.5);
      cursor: pointer; z-index: 30;
      transition: transform 0.15s;
    }
    .fab:active { transform: scale(0.92); }

    /* ── Modal ajout article ── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 40; display: none;
      align-items: flex-end; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: white; color: #0f172a;
      border-radius: 24px 24px 0 0;
      padding: 20px 20px 40px;
      width: 100%; max-width: 640px;
    }
    .modal-handle { width: 36px; height: 4px; background: #e2e8f0; border-radius: 2px; margin: 0 auto 16px; }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
    .modal .form-group { margin-bottom: 12px; }
    .modal .form-label { font-size: 13px; font-weight: 500; color: #475569; margin-bottom: 4px; display: block; }
    .modal .form-input, .modal .form-select {
      width: 100%; height: 44px;
      border: 1px solid #e2e8f0; border-radius: 10px;
      padding: 0 12px; font-size: 15px; background: #f8fafc; outline: none;
    }
    .modal .form-input:focus, .modal .form-select:focus { border-color: #4f46e5; background: white; }
    .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
    .modal-btn {
      flex: 1; height: 50px; border: none; border-radius: 12px;
      font-size: 16px; font-weight: 600; cursor: pointer;
    }
    .modal-btn-cancel { background: #f1f5f9; color: #475569; }
    .modal-btn-save { background: #4f46e5; color: white; }

    /* ── Bottom panel ── */
    #panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: white;
      border-radius: 24px 24px 0 0;
      padding: 20px 20px 36px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      z-index: 20;
      color: #0f172a;
    }

    #panel.open { transform: translateY(0); }

    .panel-handle {
      width: 36px; height: 4px;
      background: #e2e8f0;
      border-radius: 2px;
      margin: 0 auto 16px;
    }

    .panel-zone {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: #4f46e5; margin-bottom: 4px;
    }

    .panel-name { font-size: 22px; font-weight: 800; color: #0f172a; margin-bottom: 2px; }
    .panel-ref  { font-size: 12px; color: #94a3b8; font-family: monospace; margin-bottom: 16px; }

    .stock-row {
      display: flex; align-items: center; justify-content: space-between;
      background: #f8fafc; border-radius: 12px; padding: 12px 16px;
      margin-bottom: 16px;
    }
    .stock-label { font-size: 13px; color: #64748b; }
    .stock-val   { font-size: 28px; font-weight: 900; color: #0f172a; }
    .stock-unit  { font-size: 12px; color: #94a3b8; margin-top: 2px; text-align: right; }

    /* Qty */
    .qty-row {
      display: flex; align-items: center; justify-content: center;
      gap: 20px; margin-bottom: 16px;
    }
    .qty-btn {
      width: 48px; height: 48px;
      border: 2px solid #e2e8f0; border-radius: 50%;
      background: white; font-size: 24px; font-weight: 300;
      color: #334155; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.1s;
    }
    .qty-btn:active { transform: scale(0.88); background: #f1f5f9; }
    .qty-val { font-size: 36px; font-weight: 800; min-width: 56px; text-align: center; }

    /* Action buttons */
    .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }

    .btn-action {
      height: 72px; border: none; border-radius: 14px;
      font-size: 18px; font-weight: 800; cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2px;
      transition: transform 0.1s;
    }
    .btn-action:active { transform: scale(0.95); }
    .btn-action sub { font-size: 11px; font-weight: 500; opacity: 0.8; }
    .btn-sortie { background: #dc2626; color: white; }
    .btn-entree { background: #16a34a; color: white; }

    /* Employee */
    .employee-row { display: flex; align-items: center; gap: 8px; }
    .employee-row label { font-size: 13px; color: #64748b; white-space: nowrap; }
    .employee-input {
      flex: 1; height: 38px;
      border: 1px solid #e2e8f0; border-radius: 10px;
      padding: 0 12px; font-size: 14px; outline: none; background: #f8fafc;
    }
    .employee-input:focus { border-color: #4f46e5; background: white; }

    /* Flash */
    .flash {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      padding: 12px 24px; border-radius: 12px;
      font-size: 14px; font-weight: 600;
      opacity: 0; transition: opacity 0.25s; pointer-events: none;
      z-index: 99; white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
    .flash.success { background: #16a34a; color: white; opacity: 1; }
    .flash.error   { background: #dc2626; color: white; opacity: 1; }
    .flash.hide    { opacity: 0; }

    /* Permission screen */
    #perm-screen {
      position: absolute; inset: 0;
      background: #0f172a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px; text-align: center; z-index: 50;
    }
    .perm-icon { font-size: 56px; margin-bottom: 16px; }
    .perm-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .perm-sub { font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 28px; line-height: 1.5; }
    .perm-btn {
      background: #4f46e5; color: white; border: none;
      padding: 14px 32px; border-radius: 12px;
      font-size: 16px; font-weight: 600; cursor: pointer;
    }

    /* Loading detected */
    #loading-article {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.6);
      display: none; align-items: center; justify-content: center;
      z-index: 15;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="camera-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <!-- Permission screen -->
  <div id="perm-screen">
    <div class="perm-icon">📷</div>
    <div class="perm-title">Accès caméra requis</div>
    <div class="perm-sub">L'app a besoin de la caméra pour scanner les QR codes des articles.</div>
    <button class="perm-btn" onclick="startCamera()">Autoriser la caméra</button>
  </div>

  <!-- Loading -->
  <div id="loading-article">
    <div class="spinner"></div>
  </div>

  <!-- Top bar -->
  <div class="top-bar">
    <span class="top-logo">📦 K-Stock</span>
    <div class="top-actions">
      <a class="icon-btn" href="articles.html" title="Articles">☰</a>
      <a class="icon-btn" href="labels.html" title="Étiquettes">🏷</a>
    </div>
  </div>

  <!-- Scan overlay -->
  <div class="scan-overlay" id="scan-overlay">
    <div class="scan-frame">
      <div class="scan-corner-br"></div>
      <div class="scan-corner-bl"></div>
      <div class="scan-line"></div>
    </div>
    <div class="scan-hint">Pointe vers un QR code</div>
  </div>

  <!-- Bottom panel -->
  <div id="panel">
    <div class="panel-handle"></div>
    <div class="panel-zone" id="p-zone"></div>
    <div class="panel-name" id="p-name"></div>
    <div class="panel-ref"  id="p-ref"></div>

    <div class="stock-row">
      <div>
        <div class="stock-label">Stock actuel</div>
        <div class="stock-val" id="p-stock">—</div>
      </div>
      <div class="stock-unit" id="p-unit"></div>
    </div>

    <div class="qty-row">
      <button class="qty-btn" onclick="changeQty(-1)">−</button>
      <div class="qty-val" id="qty-display">1</div>
      <button class="qty-btn" onclick="changeQty(1)">+</button>
    </div>

    <div class="action-row">
      <button class="btn-action btn-sortie" onclick="doAction('sortie')">
        ↓ SORTIE<br><sub>retirer</sub>
      </button>
      <button class="btn-action btn-entree" onclick="doAction('entree')">
        ↑ ENTRÉE<br><sub>ajouter</sub>
      </button>
    </div>

    <div class="employee-row">
      <label>Qui ?</label>
      <input type="text" class="employee-input" id="employee-input" placeholder="Ton prénom…" />
    </div>
  </div>
</div>

<div class="flash" id="flash"></div>

<!-- Bouton + -->
<button class="fab" onclick="openModal()">+</button>

<!-- Modal ajout article -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Nouvel article</div>

    <div class="form-group">
      <label class="form-label">Référence *</label>
      <input type="text" class="form-input" id="m-ref" placeholder="ex: RACK-PCM3000" autocapitalize="characters" />
    </div>
    <div class="form-group">
      <label class="form-label">Nom *</label>
      <input type="text" class="form-input" id="m-nom" placeholder="ex: PCM 3000m" />
    </div>
    <div class="form-group">
      <label class="form-label">Zone *</label>
      <select class="form-select" id="m-zone">
        <option value="">-- Choisir --</option>
        <option value="PALETTE">Stockage palette</option>
        <option value="CHUTE">Chute de matière</option>
        <option value="CONSO">Consommables / accessoires</option>
        <option value="RACK">Matière dans les racks</option>
        <option value="RELIQUAT">Reliquat de commande</option>
        <option value="BOX-LOG">Box container logistique</option>
        <option value="SHOWROOM">Showroom</option>
        <option value="BE">Zone BE</option>
        <option value="MATERIAU">Matériautheque</option>
        <option value="FACONNE">Stock façonnage</option>
        <option value="LOGISTIQUE">Zone logistique</option>
      </select>
    </div>
    <div class="modal-row">
      <div class="form-group">
        <label class="form-label">Unité</label>
        <input type="text" class="form-input" id="m-unite" placeholder="rouleau, boîte…" />
      </div>
      <div class="form-group">
        <label class="form-label">Stock initial</label>
        <input type="number" class="form-input" id="m-stock" value="0" min="0" />
      </div>
    </div>

    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="modal-btn modal-btn-save" id="modal-save-btn" onclick="saveArticle()">Créer</button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

  const ZONES = {
    PALETTE:'Stockage palette', CHUTE:'Chute de matière', CONSO:'Consommables',
    RACK:'Matière racks', RELIQUAT:'Reliquat', 'BOX-LOG':'Box logistique',
    SHOWROOM:'Showroom', BE:'Zone BE', MATERIAU:'Matériautheque',
    FACONNE:'Façonnage', LOGISTIQUE:'Logistique',
  };

  let currentArticle = null;
  let qty = 1;
  let scanning = true;
  let scanCooldown = false;

  const video    = document.getElementById('video');
  const canvas   = document.getElementById('canvas');
  const ctx      = canvas.getContext('2d');
  const panel    = document.getElementById('panel');
  const permScr  = document.getElementById('perm-screen');
  const loading  = document.getElementById('loading-article');

  // Restore employee name
  const empInput = document.getElementById('employee-input');
  empInput.value = localStorage.getItem('kstock_employee') || '';
  empInput.addEventListener('change', () => localStorage.setItem('kstock_employee', empInput.value.trim()));

  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
      });
      video.srcObject = stream;
      permScr.style.display = 'none';
      requestAnimationFrame(tick);
    } catch {
      permScr.querySelector('.perm-sub').textContent = 'Accès refusé. Active la caméra dans les réglages de ton téléphone.';
    }
  }

  function tick() {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      if (scanning && !scanCooldown) {
        const img  = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' });
        if (code) onQRDetected(code.data);
      }
    }
    requestAnimationFrame(tick);
  }

  async function onQRDetected(data) {
    // Extract ref from URL or use raw value
    let ref;
    try {
      const url = new URL(data);
      ref = url.searchParams.get('ref');
    } catch {
      ref = data; // QR code contient directement la ref
    }
    if (!ref) return;

    scanCooldown = true;
    scanning = false;
    loading.style.display = 'flex';

    try {
      const article = await API.getArticle(ref);
      if (article.error) throw new Error();
      showPanel(article);
    } catch {
      showFlash('Article introuvable', 'error');
      setTimeout(() => { scanCooldown = false; scanning = true; }, 1500);
    } finally {
      loading.style.display = 'none';
    }
  }

  function showPanel(article) {
    currentArticle = article;
    qty = 1;
    document.getElementById('qty-display').textContent = '1';
    document.getElementById('p-zone').textContent  = ZONES[article.zone] || article.zone || '';
    document.getElementById('p-name').textContent  = article.nom;
    document.getElementById('p-ref').textContent   = article.ref;
    document.getElementById('p-stock').textContent = parseInt(article.stock_actuel) || 0;
    document.getElementById('p-unit').textContent  = article.unite || 'unité(s)';
    document.getElementById('scan-overlay').style.opacity = '0.3';
    panel.classList.add('open');
  }

  function closePanel() {
    panel.classList.remove('open');
    document.getElementById('scan-overlay').style.opacity = '1';
    currentArticle = null;
    setTimeout(() => { scanCooldown = false; scanning = true; }, 800);
  }

  function changeQty(delta) {
    qty = Math.max(1, qty + delta);
    document.getElementById('qty-display').textContent = qty;
  }

  async function doAction(type) {
    if (!currentArticle) return;
    const btns = document.querySelectorAll('.btn-action');
    btns.forEach(b => { b.disabled = true; b.style.opacity = '0.5'; });

    try {
      const employe = empInput.value.trim() || 'Anonyme';
      const res = await API.movement(currentArticle.ref, type, qty, employe);
      if (res.error) throw new Error(res.error);

      document.getElementById('p-stock').textContent = res.stock_actuel;
      const msg = type === 'sortie' ? `−${qty} enregistré ✓` : `+${qty} enregistré ✓`;
      showFlash(msg, 'success');

      setTimeout(() => closePanel(), 900);
    } catch {
      showFlash('Erreur — réessaie', 'error');
      btns.forEach(b => { b.disabled = false; b.style.opacity = '1'; });
    }
  }

  function showFlash(msg, type) {
    const el = document.getElementById('flash');
    el.textContent = msg;
    el.className = `flash ${type}`;
    setTimeout(() => el.classList.add('hide'), 1800);
    setTimeout(() => el.className = 'flash', 2200);
  }

  // Fermer le panel en swipant vers le bas
  let touchStartY = 0;
  panel.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; });
  panel.addEventListener('touchend', e => {
    if (e.changedTouches[0].clientY - touchStartY > 60) closePanel();
  });

  // ── Modal ajout article ──
  function openModal() {
    document.getElementById('modal-backdrop').classList.add('open');
    scanning = false;
  }

  function closeModal() {
    document.getElementById('modal-backdrop').classList.remove('open');
    ['m-ref','m-nom','m-unite'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('m-stock').value = '0';
    document.getElementById('m-zone').value = '';
    if (!panel.classList.contains('open')) scanning = true;
  }

  function closeModalOutside(e) {
    if (e.target === document.getElementById('modal-backdrop')) closeModal();
  }

  async function saveArticle() {
    const ref   = document.getElementById('m-ref').value.trim().toUpperCase();
    const nom   = document.getElementById('m-nom').value.trim();
    const zone  = document.getElementById('m-zone').value;
    const unite = document.getElementById('m-unite').value.trim();
    const stock = parseInt(document.getElementById('m-stock').value) || 0;

    if (!ref || !nom || !zone) { showFlash('Référence, nom et zone requis', 'error'); return; }

    const btn = document.getElementById('modal-save-btn');
    btn.disabled = true; btn.textContent = '…';

    try {
      const res = await API.addArticle({ ref, nom, zone, unite, stock_actuel: stock, stock_mini: 0 });
      if (res.error) throw new Error(res.error);
      showFlash(`"${nom}" créé ✓`, 'success');
      closeModal();
    } catch (e) {
      showFlash(e.message || 'Erreur', 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Créer';
    }
  }

  // Auto-start si permission déjà accordée
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
    .then(stream => { video.srcObject = stream; permScr.style.display = 'none'; requestAnimationFrame(tick); })
    .catch(() => { /* show perm screen */ });
</script>
</body>
</html>
